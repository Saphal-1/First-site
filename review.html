<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Review System</title>

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
        }

        .three-dots {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
        }

        .admin-menu {
            display: none;
            position: absolute;
            right: 10px;
            top: 35px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .admin-menu button {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border: none;
            background: white;
            cursor: pointer;
        }

        .admin-menu button:hover {
            background: #eee;
        }

        .rating-stars {
            color: gold;
            font-size: 18px;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            animation: floatUp 0.3s ease;
        }

        .modal-box input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        .modal-buttons button {
            margin: 5px;
            font-weight: bold;
        }

        .confirm-btn {
            background: #00ffcc;
        }

        .cancel-btn {
            background: #333;
            color: white;
        }

        @keyframes floatUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>

<h2>Review System</h2>

<form id="reviewForm">
    <input type="text" id="reviewName" placeholder="Your Name" required>

    <select id="reviewRating" required>
        <option value="5">★★★★★</option>
        <option value="4">★★★★</option>
        <option value="3">★★★</option>
        <option value="2">★★</option>
        <option value="1">★</option>
    </select>

    <textarea id="reviewMessage" placeholder="Write review..." required></textarea>

    <button type="submit">Post Review</button>
</form>

<hr>

<div id="reviewsContainer"></div>

<!-- SECRET MODAL -->
<div id="secretModal" class="modal">
    <div class="modal-box">
        <h3>Enter Secret Code</h3>
        <input type="password" id="secretInput" placeholder="Secret Code">
        <div class="modal-buttons">
            <button class="confirm-btn" onclick="confirmSecret()">Confirm</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="review.js"></script>

</body>
</html>
