<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | Saphal Developer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        /* Modern Glassmorphism & Auth UI */
        .glassmorphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .review-input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; outline: none; font-family: 'Poppins', sans-serif;
        }
        .review-input:focus { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        
        .submit-btn { 
            width: 100%; background: linear-gradient(90deg, #00f2ff, #a855f7); color: white;
            padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 5px;
        }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        
        .review-card { position: relative; margin-top: 20px; text-align: left; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .three-dots { 
            position: absolute; top: 15px; right: 15px; cursor: pointer; 
            opacity: 0.6; transition: 0.3s; padding: 5px;
        }
        .three-dots:hover { opacity: 1; color: #00f2ff; }
        
        .admin-menu { 
            display: none; position: absolute; top: 40px; right: 10px; 
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; z-index: 100; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .admin-menu button { 
            display: block; width: 100%; padding: 10px 20px; background: none; 
            color: white; border: none; cursor: pointer; text-align: left; font-size: 13px; font-family: 'Poppins', sans-serif;
        }
        .admin-menu button:hover { background: rgba(0, 242, 255, 0.1); color: #00f2ff; }
        .rating-stars { color: #00f2ff; margin-bottom: 8px; letter-spacing: 2px; }

        /* Auth Modals */
        .overlay-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            padding: 40px 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .auth-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px; color: white;
            font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-bottom: 12px; transition: 0.3s;
        }
        .google-btn { background: #db4437; }
        .google-btn:hover { background: #ea4335; box-shadow: 0 5px 15px rgba(219, 68, 55, 0.3); }
        .discord-btn { background: #5865F2; }
        .discord-btn:hover { background: #4752C4; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3); }
        .guest-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .guest-btn:hover { background: rgba(255,255,255,0.15); }

        .user-profile-bar {
            display: none; align-items: center; justify-content: space-between;
            background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 10px 15px; border-radius: 10px; margin-bottom: 15px;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .logout-btn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .logout-btn:hover { background: #ff4d4d; color: white; }

        .cancel-btn { background: transparent; color: #ff4d4d; margin-top: 10px; padding: 10px; cursor: pointer; border: none; font-size: 14px; width: 100%; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<nav>
  <a href="index.html" class="logo">Saphal<span style="color:#00f2ff">.</span></a>
    <div class="nav-links">
        <a href="index.html">Home</a>
    </div>
</nav>

<div class="container" style="display: block; max-width: 800px; margin: 100px auto;">
    
    <div id="userProfileBar" class="user-profile-bar">
        <div class="user-info">
            <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
            <div>
                <div id="userName" style="font-size: 14px; font-weight: 600;">Name</div>
                <div id="userEmail" style="font-size: 11px; opacity: 0.7;">Email</div>
            </div>
        </div>
        <button onclick="logout()" class="logout-btn">Log Out</button>
    </div>

    <div class="card glassmorphism">
        <h2 class="title small gradient-text" id="formTitle">Leave a Review</h2>
        <form id="reviewForm">
            <select id="reviewRating" class="review-input" style="color: #00f2ff;">
                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ (Great)</option>
                <option value="3">⭐⭐⭐ (Good)</option>
                <option value="2">⭐⭐ (Fair)</option>
                <option value="1">⭐ (Poor)</option>
            </select>
            <textarea id="reviewMessage" class="review-input" rows="4" placeholder="Share your experience with the community..." required></textarea>
            <button type="submit" id="submitBtn" class="submit-btn">SUBMIT REVIEW</button>
            <button type="button" id="cancelEdit" class="cancel-btn" style="display: none;">Cancel Editing</button>
        </form>
    </div>

    <div id="reviewsContainer"></div>
</div>

<div id="authModal" class="overlay-modal">
    <div class="modal-content glassmorphism">
        <h2 class="title small gradient-text" style="font-size: 26px; margin-bottom: 10px;">Welcome</h2>
        <p style="font-size: 13px; opacity: 0.7; margin-bottom: 25px;">Sign in to leave a review and join the community.</p>
        
        <button class="auth-btn google-btn" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Continue with Google
        </button>
        <button class="auth-btn discord-btn" onclick="loginWithDiscord()">
            <i class="fa-brands fa-discord"></i> Continue with Discord
        </button>
        <div style="margin: 15px 0; font-size: 12px; opacity: 0.5;">OR</div>
        <button class="auth-btn guest-btn" onclick="continueAsGuest()">
            <i class="fa-solid fa-user-secret"></i> Continue as Guest
        </button>
    </div>
</div>

<div id="guestPopup" class="overlay-modal">
    <div class="modal-content glassmorphism" style="border: 1px solid #ff4d4d; box-shadow: 0 0 30px rgba(255, 77, 77, 0.2);">
        <i class="fa-solid fa-lock" style="font-size: 40px; color: #ff4d4d; margin-bottom: 15px;"></i>
        <h3 style="font-size: 18px; margin-bottom: 10px; color: white;">Authentication Required</h3>
        <p style="font-size: 13px; opacity: 0.8; margin-bottom: 20px;">You must sign in with Google or Discord to submit, edit, or manage a review.</p>
        <button class="submit-btn" onclick="document.getElementById('guestPopup').style.display = 'none'; openAuthModal();">Sign In Now</button>
        <button class="cancel-btn" onclick="document.getElementById('guestPopup').style.display = 'none';">Close</button>
    </div>
</div>

<script src="review.js"></script>
<script>
    particlesJS("particles-js", {
        particles: {
            number: { value: 50 },
            color: { value: "#00f2ff" },
            opacity: { value: 0.3 },
            size: { value: 2 },
            line_linked: { enable: true, distance: 150, color: "#00f2ff", opacity: 0.1 },
            move: { enable: true, speed: 1 }
        }
    });
</script>
</body>

</html>
